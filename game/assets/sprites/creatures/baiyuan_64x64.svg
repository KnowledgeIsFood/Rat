<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" shape-rendering="crispEdges">
  <rect width="64" height="64" fill="none"/>
  <g transform="scale(2)">
    <!-- color guide:
         #2a2a2a deep line, #8f8f8a dark fur, #b9b9b3 mid fur, #deded8 light fur, #f3f3ed highlight -->

    <!-- long tail with ringed fur -->
    <rect x="1" y="16" width="2" height="1" fill="#2a2a2a"/>
    <rect x="2" y="15" width="2" height="1" fill="#8f8f8a"/>
    <rect x="2" y="16" width="3" height="1" fill="#b9b9b3"/>
    <rect x="2" y="17" width="3" height="1" fill="#8f8f8a"/>
    <rect x="3" y="18" width="3" height="1" fill="#b9b9b3"/>
    <rect x="4" y="19" width="3" height="1" fill="#deded8"/>
    <rect x="6" y="20" width="2" height="1" fill="#b9b9b3"/>

    <!-- back silhouette / shoulder -->
    <rect x="8" y="12" width="1" height="8" fill="#2a2a2a"/>
    <rect x="9" y="11" width="1" height="9" fill="#8f8f8a"/>
    <rect x="10" y="11" width="10" height="10" fill="#deded8"/>
    <rect x="10" y="11" width="10" height="1" fill="#f3f3ed"/>
    <rect x="11" y="13" width="7" height="6" fill="#b9b9b3"/>
    <rect x="12" y="14" width="5" height="4" fill="#deded8"/>

    <!-- fur tufts -->
    <rect x="10" y="21" width="1" height="1" fill="#8f8f8a"/>
    <rect x="12" y="21" width="1" height="1" fill="#8f8f8a"/>
    <rect x="14" y="21" width="1" height="1" fill="#8f8f8a"/>
    <rect x="16" y="21" width="1" height="1" fill="#8f8f8a"/>
    <rect x="18" y="21" width="1" height="1" fill="#8f8f8a"/>

    <!-- head turned back -->
    <rect x="17" y="7" width="9" height="1" fill="#2a2a2a"/>
    <rect x="18" y="8" width="8" height="5" fill="#f3f3ed"/>
    <rect x="18" y="8" width="1" height="5" fill="#8f8f8a"/>
    <rect x="25" y="8" width="1" height="5" fill="#8f8f8a"/>
    <!-- ear -->
    <rect x="19" y="6" width="2" height="2" fill="#deded8"/>
    <rect x="20" y="7" width="1" height="1" fill="#b9b9b3"/>
    <rect x="23" y="6" width="2" height="2" fill="#deded8"/>
    <rect x="23" y="7" width="1" height="1" fill="#b9b9b3"/>
    <!-- face -->
    <rect x="21" y="9" width="1" height="1" fill="#2a2a2a"/>
    <rect x="23" y="9" width="1" height="1" fill="#2a2a2a"/>
    <rect x="22" y="10" width="2" height="1" fill="#8f8f8a"/>
    <rect x="24" y="10" width="1" height="1" fill="#2a2a2a"/>
    <rect x="22" y="11" width="2" height="1" fill="#b9b9b3"/>

    <!-- forearm (long) and hand -->
    <rect x="22" y="13" width="1" height="9" fill="#2a2a2a"/>
    <rect x="23" y="13" width="2" height="9" fill="#b9b9b3"/>
    <rect x="24" y="14" width="1" height="7" fill="#deded8"/>
    <rect x="25" y="20" width="2" height="4" fill="#8f8f8a"/>
    <rect x="24" y="23" width="1" height="2" fill="#2a2a2a"/>
    <!-- fingers gripping branch -->
    <rect x="24" y="24" width="1" height="1" fill="#2a2a2a"/>
    <rect x="25" y="24" width="1" height="1" fill="#2a2a2a"/>
    <rect x="26" y="24" width="1" height="1" fill="#2a2a2a"/>

    <!-- secondary arm -->
    <rect x="7" y="14" width="1" height="7" fill="#2a2a2a"/>
    <rect x="8" y="14" width="2" height="7" fill="#b9b9b3"/>
    <rect x="9" y="15" width="1" height="5" fill="#deded8"/>
    <rect x="6" y="20" width="2" height="3" fill="#8f8f8a"/>

    <!-- legs -->
    <rect x="10" y="22" width="1" height="6" fill="#2a2a2a"/>
    <rect x="11" y="22" width="2" height="6" fill="#b9b9b3"/>
    <rect x="12" y="23" width="1" height="4" fill="#deded8"/>
    <rect x="15" y="22" width="1" height="6" fill="#2a2a2a"/>
    <rect x="16" y="22" width="2" height="6" fill="#b9b9b3"/>
    <rect x="17" y="23" width="1" height="4" fill="#deded8"/>
    <!-- feet -->
    <rect x="10" y="28" width="3" height="1" fill="#8f8f8a"/>
    <rect x="16" y="28" width="3" height="1" fill="#8f8f8a"/>
    <rect x="10" y="29" width="2" height="1" fill="#2a2a2a"/>
    <rect x="17" y="29" width="2" height="1" fill="#2a2a2a"/>

    <!-- branch -->
    <rect x="5" y="25" width="22" height="2" fill="#6c5844"/>
    <rect x="6" y="24" width="3" height="1" fill="#8a715c"/>
    <rect x="11" y="24" width="2" height="1" fill="#8a715c"/>
    <rect x="18" y="24" width="2" height="1" fill="#8a715c"/>
    <rect x="23" y="24" width="2" height="1" fill="#8a715c"/>

    <!-- water-jade crystal cluster -->
    <rect x="27" y="22" width="1" height="1" fill="#b5e4f4"/>
    <rect x="26" y="23" width="3" height="2" fill="#76b9d2"/>
    <rect x="27" y="23" width="1" height="1" fill="#a9dced"/>
    <rect x="28" y="24" width="1" height="1" fill="#5b9bb2"/>
  </g>
</svg>
