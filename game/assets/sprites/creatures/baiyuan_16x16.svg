<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <rect width="16" height="16" fill="none"/>
  <!-- tail -->
  <rect x="1" y="7" width="1" height="1" fill="#9a9a9a"/>
  <rect x="0" y="8" width="1" height="1" fill="#7c7c7c"/>
  <rect x="1" y="9" width="1" height="1" fill="#9a9a9a"/>
  <rect x="2" y="10" width="1" height="1" fill="#b9b9b9"/>
  <!-- body -->
  <rect x="5" y="5" width="5" height="5" fill="#e7e7e2"/>
  <rect x="4" y="6" width="1" height="3" fill="#d6d6d1"/>
  <rect x="10" y="6" width="1" height="3" fill="#d6d6d1"/>
  <rect x="6" y="10" width="3" height="1" fill="#c2c2bd"/>
  <!-- head turned back -->
  <rect x="9" y="3" width="3" height="3" fill="#ecece7"/>
  <rect x="10" y="2" width="1" height="1" fill="#d9d9d4"/>
  <rect x="11" y="2" width="1" height="1" fill="#d9d9d4"/>
  <rect x="10" y="4" width="1" height="1" fill="#1f1f1f"/>
  <rect x="11" y="5" width="1" height="1" fill="#b8b8b2"/>
  <!-- long forearm -->
  <rect x="11" y="7" width="1" height="4" fill="#ccccc7"/>
  <rect x="12" y="10" width="1" height="2" fill="#b4b4af"/>
  <!-- hind leg -->
  <rect x="5" y="10" width="1" height="3" fill="#bdbdb8"/>
  <rect x="8" y="10" width="1" height="3" fill="#bdbdb8"/>
  <!-- branch + water-jade hint -->
  <rect x="3" y="12" width="10" height="1" fill="#6e5945"/>
  <rect x="4" y="11" width="1" height="1" fill="#8f755f"/>
  <rect x="13" y="11" width="1" height="1" fill="#74b9d4"/>
</svg>
