<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <rect width="32" height="32" fill="none"/>
  <!-- tail -->
  <rect x="2" y="15" width="2" height="1" fill="#8d8d8d"/>
  <rect x="1" y="16" width="2" height="1" fill="#767676"/>
  <rect x="2" y="17" width="2" height="1" fill="#8d8d8d"/>
  <rect x="3" y="18" width="2" height="1" fill="#a1a1a1"/>
  <rect x="4" y="19" width="2" height="1" fill="#b6b6b6"/>
  <!-- torso -->
  <rect x="10" y="11" width="10" height="9" fill="#ecece6"/>
  <rect x="9" y="12" width="1" height="7" fill="#d8d8d2"/>
  <rect x="20" y="12" width="1" height="7" fill="#d8d8d2"/>
  <rect x="11" y="20" width="8" height="1" fill="#c8c8c2"/>
  <!-- head turned back -->
  <rect x="18" y="7" width="7" height="5" fill="#f1f1eb"/>
  <rect x="19" y="6" width="2" height="1" fill="#dcdcd6"/>
  <rect x="22" y="6" width="2" height="1" fill="#dcdcd6"/>
  <rect x="20" y="9" width="1" height="1" fill="#1f1f1f"/>
  <rect x="23" y="10" width="1" height="1" fill="#afafa9"/>
  <rect x="22" y="11" width="2" height="1" fill="#c7c7c1"/>
  <!-- long forearm -->
  <rect x="22" y="14" width="2" height="7" fill="#d1d1cb"/>
  <rect x="24" y="20" width="2" height="4" fill="#b5b5af"/>
  <rect x="25" y="24" width="2" height="1" fill="#969690"/>
  <!-- second arm -->
  <rect x="8" y="14" width="2" height="6" fill="#cecec8"/>
  <rect x="7" y="19" width="2" height="3" fill="#b8b8b2"/>
  <!-- legs -->
  <rect x="11" y="21" width="2" height="6" fill="#bdbdb7"/>
  <rect x="16" y="21" width="2" height="6" fill="#bdbdb7"/>
  <rect x="10" y="27" width="3" height="1" fill="#969690"/>
  <rect x="16" y="27" width="3" height="1" fill="#969690"/>
  <!-- branch and jade crystal -->
  <rect x="6" y="25" width="20" height="2" fill="#6c5844"/>
  <rect x="7" y="24" width="2" height="1" fill="#876d57"/>
  <rect x="26" y="23" width="2" height="2" fill="#75b8d1"/>
  <rect x="27" y="22" width="1" height="1" fill="#a2d8ec"/>
